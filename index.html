<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Library">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EA258D">
<meta name="description" content="Your personal PDF reading library — auto-sorted, annotated, beautifully yours.">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>The Library</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --hot-pink:#EA258D; --orange:#F5952D; --blush:#F1BCD7; --pink:#F37EB3;
  --periwinkle:#B2C0F9; --lavender:#D9AED0; --salmon:#FFAD8E; --cotton-candy:#F7C6E5;
  --cream:#FEF9F5; --off-white:#FBF8FC; --soft-rose:#FFF5F9; --celery:#EEFBD4;
  --text:#111111;
}
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); overflow-x:hidden; min-height:100dvh; display:flex; flex-direction:column; }
button { font-family:inherit; cursor:pointer; border:none; outline:none; }
input { font-family:inherit; outline:none; border:none; }

/* TOP BAR */
.top-bar { background:var(--hot-pink); padding:16px 20px 12px; padding-top:calc(env(safe-area-inset-top) + 16px); position:sticky; top:0; z-index:100; }
.top-bar h1 { color:#fff; font-size:22px; font-weight:800; letter-spacing:2px; text-transform:uppercase; }
.accent-strip { height:5px; background:var(--orange); position:sticky; top:52px; z-index:100; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#fff; display:flex; z-index:100; border-top:3px solid var(--blush); padding-bottom:env(safe-area-inset-bottom); }
.bottom-nav button { flex:1; padding:10px 0 8px; background:none; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text); opacity:.45; transition:.2s; }
.bottom-nav button.active { opacity:1; color:var(--hot-pink); }
.bottom-nav svg { width:22px; height:22px; }

/* MAIN CONTENT */
.main-content { flex:1; padding-bottom:72px; }
.view { display:none; }
.view.active { display:block; }

/* LIBRARY VIEW */
.search-bar { margin:16px; position:relative; }
.search-bar input { width:100%; background:var(--soft-rose); border:2px solid var(--hot-pink); border-radius:12px; padding:12px 16px 12px 42px; font-size:15px; font-weight:400; color:var(--text); }
.search-bar svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--hot-pink); }
.search-results { padding:0 16px 16px; }

/* CONTINUE READING CARD */
.continue-card { margin:0 16px 20px; background:var(--cotton-candy); border-radius:16px; padding:20px; display:flex; gap:16px; align-items:center; }
.continue-card.hidden { display:none; }
.continue-card img { width:64px; height:90px; object-fit:cover; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.continue-card .info { flex:1; }
.continue-card .info h3 { font-size:16px; font-weight:800; margin-bottom:4px; }
.continue-card .info p { font-size:13px; font-weight:400; opacity:.7; margin-bottom:10px; }
.continue-card .info button { background:var(--hot-pink); color:#fff; font-weight:800; font-size:13px; padding:10px 28px; border-radius:10px; text-transform:uppercase; letter-spacing:1px; }

/* SHELF */
.shelf { margin-bottom:24px; }
.shelf-label { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; padding:8px 16px; margin-bottom:10px; color:var(--text); border-radius:0 8px 8px 0; display:inline-block; }
.shelf-scroll { display:flex; gap:14px; overflow-x:auto; padding:0 16px 8px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.shelf-scroll::-webkit-scrollbar { display:none; }
.shelf-empty { padding:0 16px; font-size:13px; font-weight:400; opacity:.5; font-style:italic; }

/* BOOK CARD */
.book-card { flex-shrink:0; width:130px; scroll-snap-align:start; cursor:pointer; position:relative; }
.book-card .cover { width:130px; height:185px; border-radius:10px; overflow:hidden; position:relative; box-shadow:0 3px 12px rgba(0,0,0,.12); }
.book-card .cover img { width:100%; height:100%; object-fit:cover; }
.book-card .cover .no-cover { width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:12px; text-align:center; font-size:12px; font-weight:800; color:#fff; }
.book-card .progress-bar { height:4px; background:var(--blush); border-radius:2px; margin-top:6px; overflow:hidden; }
.book-card .progress-bar .fill { height:100%; background:var(--hot-pink); border-radius:2px; transition:width .3s; }
.book-card .title { font-size:12px; font-weight:800; margin-top:6px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.book-card .tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; }
.book-card .tag-chip { font-size:9px; font-weight:800; padding:2px 6px; border-radius:6px; text-transform:uppercase; letter-spacing:.5px; }

/* ADD BOOK BUTTON */
.add-book-btn { position:fixed; bottom:80px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--hot-pink); color:#fff; font-size:28px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(234,37,141,.4); z-index:90; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--cream); width:100%; max-width:480px; max-height:90vh; border-radius:20px 20px 0 0; padding:24px; overflow-y:auto; }
.modal h2 { font-size:18px; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; color:var(--hot-pink); }
.modal label { display:block; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; margin-top:14px; }
.modal input[type="text"] { width:100%; background:var(--off-white); border:2px solid var(--blush); border-radius:10px; padding:10px 14px; font-size:14px; }
.modal .file-input-wrap { background:var(--soft-rose); border:2px dashed var(--hot-pink); border-radius:10px; padding:20px; text-align:center; cursor:pointer; font-size:13px; font-weight:400; color:var(--hot-pink); }
.modal .file-input-wrap input { display:none; }
.modal .file-input-wrap.has-file { border-style:solid; background:var(--celery); color:var(--text); }
.modal .btn-row { display:flex; gap:10px; margin-top:20px; }
.modal .btn-row button { flex:1; padding:12px; border-radius:10px; font-weight:800; font-size:14px; text-transform:uppercase; letter-spacing:1px; }
.modal .btn-cancel { background:var(--blush); color:var(--text); }
.modal .btn-save { background:var(--hot-pink); color:#fff; }

/* BOOK DETAIL */
#detail-view .detail-header { position:relative; }
#detail-view .detail-cover { width:100%; height:260px; object-fit:cover; }
#detail-view .detail-cover-placeholder { width:100%; height:260px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; color:#fff; }
#detail-view .detail-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(234,37,141,.85)); padding:20px; }
#detail-view .detail-overlay h2 { color:#fff; font-size:22px; font-weight:800; text-transform:uppercase; }
#detail-view .detail-accent { height:5px; background:var(--orange); }
#detail-view .detail-body { padding:20px; background:var(--cream); }
#detail-view .detail-author { font-size:15px; font-weight:400; opacity:.7; margin-bottom:12px; }
#detail-view .detail-dates { font-size:12px; font-weight:400; opacity:.5; margin-bottom:16px; }
#detail-view .detail-progress { height:8px; background:var(--blush); border-radius:4px; margin-bottom:8px; overflow:hidden; }
#detail-view .detail-progress .fill { height:100%; background:var(--hot-pink); border-radius:4px; }
#detail-view .detail-progress-text { font-size:12px; font-weight:800; color:var(--hot-pink); margin-bottom:20px; }
#detail-view .detail-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; }
#detail-view .detail-tag { font-size:11px; font-weight:800; padding:4px 10px; border-radius:8px; text-transform:uppercase; cursor:pointer; }
#detail-view .add-tag-btn { font-size:11px; font-weight:800; padding:4px 10px; border-radius:8px; background:var(--off-white); border:2px dashed var(--blush); color:var(--hot-pink); text-transform:uppercase; cursor:pointer; }
.section-title { font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin:20px 0 10px; color:var(--hot-pink); }
#detail-view .annotations-search { width:100%; background:var(--off-white); border:2px solid var(--blush); border-radius:10px; padding:8px 12px; font-size:13px; margin-bottom:10px; }
.annotation-item { background:var(--soft-rose); border-radius:10px; padding:12px; margin-bottom:8px; }
.annotation-item .ann-page { font-size:11px; font-weight:800; color:var(--hot-pink); margin-bottom:4px; }
.annotation-item .ann-text { font-size:13px; font-weight:400; }
#detail-view .personal-notes { width:100%; min-height:100px; background:var(--off-white); border:2px solid var(--lavender); border-radius:10px; padding:12px; font-size:14px; font-family:inherit; resize:vertical; }
.detail-actions { display:flex; gap:10px; margin-top:20px; }
.detail-actions button { flex:1; padding:14px; border-radius:12px; font-weight:800; font-size:14px; text-transform:uppercase; letter-spacing:1px; }
.btn-read { background:var(--hot-pink); color:#fff; }
.btn-finish { background:var(--celery); color:var(--text); }
.btn-delete { background:var(--salmon); color:var(--text); font-size:12px; margin-top:10px; width:100%; padding:12px; border-radius:12px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
.back-btn { position:absolute; top:16px; left:16px; z-index:10; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.85); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.15); }
.back-btn svg { width:18px; height:18px; }

/* READING VIEW */
#reading-view { position:fixed; inset:0; background:var(--cream); z-index:300; display:none; flex-direction:column; }
#reading-view.active { display:flex; }
.reader-top { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--hot-pink); }
.reader-top .reader-title { color:#fff; font-size:13px; font-weight:800; text-transform:uppercase; flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 10px; }
.reader-top button { background:rgba(255,255,255,.2); color:#fff; width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; }
.reader-canvas-wrap { flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; background:var(--cream); }
#pdf-canvas { max-width:100%; max-height:100%; }
.reader-bottom { background:var(--periwinkle); padding:8px 16px 12px; display:flex; align-items:center; gap:12px; }
.reader-page { font-size:16px; font-weight:800; color:var(--hot-pink); min-width:80px; text-align:center; }
.reader-slider { flex:1; -webkit-appearance:none; appearance:none; height:6px; background:var(--blush); border-radius:3px; }
.reader-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--hot-pink); cursor:pointer; }
.note-dots { position:absolute; right:8px; top:0; bottom:0; display:flex; flex-direction:column; gap:4px; justify-content:center; z-index:10; }
.note-dot { width:12px; height:12px; border-radius:50%; background:var(--hot-pink); cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.2); position:relative; }
.note-tooltip { position:absolute; right:20px; top:50%; transform:translateY(-50%); background:var(--blush); padding:8px 12px; border-radius:8px; font-size:12px; max-width:200px; white-space:pre-wrap; display:none; box-shadow:0 2px 8px rgba(0,0,0,.15); z-index:20; }
.note-dot.show-tip .note-tooltip { display:block; }
.add-note-btn { position:absolute; bottom:60px; right:16px; width:44px; height:44px; border-radius:50%; background:var(--hot-pink); color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 10px rgba(234,37,141,.4); z-index:10; }
.page-tap-zone { position:absolute; top:0; bottom:60px; width:33%; z-index:5; }
.page-tap-zone.left { left:0; }
.page-tap-zone.right { right:0; }

/* NOTE MODAL */
.note-modal { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:400; display:none; align-items:center; justify-content:center; padding:20px; }
.note-modal.open { display:flex; }
.note-modal .modal { border-radius:16px; max-height:60vh; }
.note-modal textarea { width:100%; min-height:80px; background:var(--off-white); border:2px solid var(--blush); border-radius:10px; padding:10px; font-size:14px; font-family:inherit; resize:vertical; margin-top:10px; }

/* NOTES VIEW */
#notes-view .notes-list { padding:16px; }
.notes-book-group { margin-bottom:20px; }
.notes-book-group h3 { font-size:14px; font-weight:800; color:var(--hot-pink); text-transform:uppercase; margin-bottom:8px; }

/* STATS VIEW */
#stats-view { background:var(--cotton-candy); min-height:calc(100dvh - 52px - 5px - 60px); }
#stats-view .stats-inner { padding:24px 20px; }
#stats-view h2 { font-size:18px; font-weight:800; text-transform:uppercase; letter-spacing:2px; margin-bottom:24px; color:var(--hot-pink); }
.stat-card { background:#fff; border-radius:16px; padding:20px; margin-bottom:14px; }
.stat-card .stat-number { font-size:48px; font-weight:800; color:var(--hot-pink); line-height:1; }
.stat-card .stat-label { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1px; opacity:.6; margin-top:6px; }
.stat-card .stat-detail { font-size:14px; font-weight:400; margin-top:4px; }

/* SETTINGS */
.settings-section { padding:20px; margin-top:10px; }
.settings-section h3 { font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--hot-pink); margin-bottom:12px; }
.settings-btn { width:100%; padding:14px; border-radius:12px; font-weight:800; font-size:14px; text-transform:uppercase; letter-spacing:1px; background:var(--off-white); border:2px solid var(--blush); color:var(--text); margin-bottom:10px; text-align:center; }

/* TAG MODAL */
.tag-modal { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
.tag-modal.open { display:flex; }
.tag-modal .modal { border-radius:16px; }
.tag-colors { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.tag-color-opt { width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; }
.tag-color-opt.selected { border-color:var(--text); }

/* HIGHLIGHT */
.highlight { background:var(--blush); padding:0 2px; border-radius:3px; }

/* FILTER BAR */
.filter-bar { display:flex; gap:6px; padding:0 16px 12px; overflow-x:auto; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.filter-chip { font-size:11px; font-weight:800; padding:6px 12px; border-radius:8px; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; white-space:nowrap; background:var(--off-white); border:2px solid var(--blush); color:var(--text); flex-shrink:0; }
.filter-chip.active { background:var(--hot-pink); color:#fff; border-color:var(--hot-pink); }

/* iPad layout */
@media(min-width:480px) {
  .main-content { max-width:960px; margin:0 auto; }
  .bottom-nav { max-width:960px; left:50%; transform:translateX(-50%); }
  .add-book-btn { right:calc(50% - 460px); }
  .book-card { width:150px; }
  .book-card .cover { width:150px; height:213px; }
}
@media(min-width:768px) {
  .shelf-scroll { gap:18px; }
  .continue-card { padding:24px; gap:20px; }
  .continue-card img { width:80px; height:112px; }
  .continue-card .info h3 { font-size:20px; }
  .detail-actions { max-width:400px; }
  .stat-card { display:inline-block; width:calc(50% - 10px); vertical-align:top; margin-right:14px; }
  .stat-card:nth-child(even) { margin-right:0; }
}
/* iOS standalone padding */
@media(display-mode: standalone) {
  .top-bar { padding-top:calc(env(safe-area-inset-top) + 12px); }
  .bottom-nav { padding-bottom:calc(env(safe-area-inset-bottom) + 4px); }
  .main-content { padding-bottom:calc(72px + env(safe-area-inset-bottom)); }
  #reading-view { padding-top:env(safe-area-inset-top); }
  #reading-view .reader-top { padding-top:4px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar"><h1>The Library</h1></div>
<div class="accent-strip"></div>

<!-- MAIN CONTENT -->
<div class="main-content">

<!-- LIBRARY VIEW -->
<div id="library-view" class="view active">
  <div class="search-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Search books, authors, tags, notes...">
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div id="search-results" class="search-results" style="display:none"></div>
  <div id="library-shelves">
    <div class="continue-card hidden" id="continue-card"></div>
    <div class="shelf" id="shelf-unread">
      <div class="shelf-label" style="background:var(--blush)">Haven't Opened</div>
      <div class="shelf-scroll" data-shelf="unread"></div>
      <div class="shelf-empty" style="display:none">No unread books yet. Add one!</div>
    </div>
    <div class="shelf" id="shelf-progress">
      <div class="shelf-label" style="background:var(--periwinkle)">In Progress</div>
      <div class="shelf-scroll" data-shelf="progress"></div>
      <div class="shelf-empty" style="display:none">Start reading a book!</div>
    </div>
    <div class="shelf" id="shelf-finished">
      <div class="shelf-label" style="background:var(--celery)">Finished</div>
      <div class="shelf-scroll" data-shelf="finished"></div>
      <div class="shelf-empty" style="display:none">No finished books yet.</div>
    </div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view" class="view">
  <div class="detail-header">
    <button class="back-btn" onclick="showView('library')"><svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div id="detail-cover-area"></div>
    <div class="detail-overlay"><h2 id="detail-title"></h2></div>
  </div>
  <div class="detail-accent" style="height:5px;background:var(--orange)"></div>
  <div class="detail-body">
    <div class="detail-author" id="detail-author"></div>
    <div class="detail-dates" id="detail-dates"></div>
    <div class="detail-progress"><div class="fill" id="detail-progress-fill"></div></div>
    <div class="detail-progress-text" id="detail-progress-text"></div>
    <div class="detail-tags" id="detail-tags"></div>
    <div class="section-title">Annotations</div>
    <input class="annotations-search" id="ann-search" type="text" placeholder="Search annotations...">
    <div id="detail-annotations"></div>
    <div class="section-title">Personal Notes</div>
    <textarea class="personal-notes" id="detail-personal-notes" placeholder="Your thoughts about this book..."></textarea>
    <div class="detail-actions">
      <button class="btn-read" id="btn-read-book">READ</button>
      <button class="btn-finish" id="btn-finish-book">MARK FINISHED</button>
    </div>
    <button class="btn-delete" id="btn-delete-book">DELETE BOOK</button>
  </div>
</div>

<!-- NOTES VIEW -->
<div id="notes-view" class="view">
  <div style="padding:16px">
    <h2 style="font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--hot-pink);margin-bottom:16px">All Notes</h2>
  </div>
  <div class="notes-list" id="all-notes-list"></div>
</div>

<!-- STATS VIEW -->
<div id="stats-view" class="view">
  <div class="stats-inner">
    <h2>Your Reading Stats</h2>
    <div id="stats-cards"></div>
    <div class="settings-section">
      <h3>Settings</h3>
      <button class="settings-btn" onclick="exportData()">Export All Data as JSON</button>
      <button class="settings-btn" onclick="importData()">Import Data from JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
  </div>
</div>
</div>

<!-- ADD BOOK FAB -->
<button class="add-book-btn" id="fab-add" onclick="openAddModal()">+</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="active" data-tab="library" onclick="showView('library')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    Library
  </button>
  <button data-tab="notes" onclick="showView('notes')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Notes
  </button>
  <button data-tab="stats" onclick="showView('stats')">

<script>
// ===================== DATABASE =====================
const DB_NAME = 'TheLibraryDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('pdfs')) d.createObjectStore('pdfs');
      if (!d.objectStoreNames.contains('covers')) d.createObjectStore('covers');
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = e => reject(e);
  });
}

function idbPut(store, key, val) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

function idbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e);
  });
}

function idbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e);
  });
}

// ===================== METADATA =====================
function getBooks() {
  try { return JSON.parse(localStorage.getItem('library_books') || '[]'); }
  catch { return []; }
}
function saveBooks(books) { localStorage.setItem('library_books', JSON.stringify(books)); }
function getBook(id) { return getBooks().find(b => b.id === id); }
function updateBook(id, updates) {
  const books = getBooks();
  const i = books.findIndex(b => b.id === id);
  if (i >= 0) { Object.assign(books[i], updates); saveBooks(books); }
}

function getTags() {
  try { return JSON.parse(localStorage.getItem('library_tags') || '[]'); }
  catch { return []; }
}
function saveTags(tags) { localStorage.setItem('library_tags', JSON.stringify(tags)); }

const TAG_COLORS = ['#EA258D','#F5952D','#F1BCD7','#F37EB3','#B2C0F9','#D9AED0','#FFAD8E','#F7C6E5','#EEFBD4'];
const COVER_COLORS = ['#EA258D','#F5952D','#F37EB3','#B2C0F9','#D9AED0','#FFAD8E'];

// ===================== VIEWS =====================
let currentView = 'library';
let currentBookId = null;
let activeTagFilter = null;

function showView(name) {
  if (name === 'detail' && !currentBookId) name = 'library';
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));

  if (name === 'detail') {
    document.getElementById('detail-view').classList.add('active');
    renderDetail(currentBookId);
  } else {
    const el = document.getElementById(name + '-view');
    if (el) el.classList.add('active');
    const btn = document.querySelector(`.bottom-nav button[data-tab="${name}"]`);
    if (btn) btn.classList.add('active');
  }

  currentView = name;
  document.getElementById('fab-add').style.display = (name === 'library') ? 'flex' : 'none';

  if (name === 'library') renderLibrary();
  if (name === 'notes') renderAllNotes();
  if (name === 'stats') renderStats();
}

// ===================== LIBRARY RENDERING =====================
function getBookStatus(book) {
  if (book.finished) return 'finished';
  if (book.currentPage > 1) return 'progress';
  return 'unread';
}

function getProgress(book) {
  if (!book.totalPages || book.totalPages <= 1) return 0;
  if (book.finished) return 1;
  return Math.min((book.currentPage - 1) / (book.totalPages - 1), 1);
}

async function renderLibrary() {
  const books = getBooks();
  const tags = getTags();

  // Filter bar
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = '';
  if (tags.length) {
    const allChip = document.createElement('div');
    allChip.className = 'filter-chip' + (activeTagFilter === null ? ' active' : '');
    allChip.textContent = 'All';
    allChip.onclick = () => { activeTagFilter = null; renderLibrary(); };
    filterBar.appendChild(allChip);
    tags.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'filter-chip' + (activeTagFilter === t.name ? ' active' : '');
      chip.textContent = t.name;
      chip.style.background = activeTagFilter === t.name ? t.color : 'var(--off-white)';
      chip.style.color = activeTagFilter === t.name ? '#fff' : 'var(--text)';
      chip.style.borderColor = t.color;
      chip.onclick = () => { activeTagFilter = activeTagFilter === t.name ? null : t.name; renderLibrary(); };
      filterBar.appendChild(chip);
    });
  }

  let filtered = books;
  if (activeTagFilter) {
    filtered = books.filter(b => b.tags && b.tags.includes(activeTagFilter));
  }

  const unread = filtered.filter(b => getBookStatus(b) === 'unread');
  const progress = filtered.filter(b => getBookStatus(b) === 'progress');
  const finished = filtered.filter(b => getBookStatus(b) === 'finished');

  // Continue reading card
  const card = document.getElementById('continue-card');
  const lastRead = progress.sort((a,b) => (b.lastReadAt||0) - (a.lastReadAt||0))[0];
  if (lastRead) {
    const cover = lastRead.coverData ? `<img src="${lastRead.coverData}" alt="">` : `<div style="width:64px;height:90px;border-radius:8px;background:${COVER_COLORS[lastRead.id.charCodeAt(0)%COVER_COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;padding:6px;text-align:center">${lastRead.title}</div>`;
    card.innerHTML = `${cover}<div class="info"><h3>${escHtml(lastRead.title)}</h3><p>Page ${lastRead.currentPage} of ${lastRead.totalPages || '?'}</p><button onclick="openReader('${lastRead.id}')">CONTINUE</button></div>`;
    card.classList.remove('hidden');
  } else {
    card.classList.add('hidden');
  }

  renderShelf('unread', unread);
  renderShelf('progress', progress);
  renderShelf('finished', finished);
}

async function renderShelf(type, books) {
  const shelf = document.getElementById('shelf-' + (type === 'unread' ? 'unread' : type === 'progress' ? 'progress' : 'finished'));
  const scroll = shelf.querySelector('.shelf-scroll');
  const empty = shelf.querySelector('.shelf-empty');
  scroll.innerHTML = '';

  if (books.length === 0) {
    scroll.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  scroll.style.display = 'flex';
  empty.style.display = 'none';

  books.forEach(book => {
    const el = document.createElement('div');
    el.className = 'book-card';
    el.onclick = () => { currentBookId = book.id; showView('detail'); };
    const tags = getTags();
    const bookTags = (book.tags || []).map(tName => {
      const t = tags.find(x => x.name === tName);
      return t ? `<span class="tag-chip" style="background:${t.color}22;color:${t.color}">${escHtml(t.name)}</span>` : '';
    }).join('');

    const coverContent = book.coverData
      ? `<img src="${book.coverData}" alt="${escHtml(book.title)}">`
      : `<div class="no-cover" style="background:${COVER_COLORS[book.id.charCodeAt(0)%COVER_COLORS.length]}">${escHtml(book.title)}</div>`;

    const prog = getProgress(book);
    el.innerHTML = `<div class="cover">${coverContent}</div><div class="progress-bar"><div class="fill" style="width:${prog*100}%"></div></div><div class="title">${escHtml(book.title)}</div><div class="tags">${bookTags}</div>`;
    scroll.appendChild(el);
  });
}

// ===================== SEARCH =====================
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const results = document.getElementById('search-results');
  const shelves = document.getElementById('library-shelves');

  if (!q) {
    results.style.display = 'none';
    shelves.style.display = 'block';
    return;
  }

  results.style.display = 'block';
  shelves.style.display = 'none';

  const books = getBooks();
  const matches = books.filter(b => {
    const searchable = [b.title, b.author, ...(b.tags||[]), ...(b.annotations||[]).map(a=>a.text), b.personalNotes||''].join(' ').toLowerCase();
    return searchable.includes(q);
  });

  results.innerHTML = matches.length ? '' : '<p style="font-size:13px;opacity:.5">No results found.</p>';
  matches.forEach(book => {
    const el = document.createElement('div');
    el.className = 'book-card';
    el.style.display = 'inline-block';
    el.style.marginRight = '14px';
    el.style.marginBottom = '14px';
    el.onclick = () => { currentBookId = book.id; showView('detail'); };
    const coverContent = book.coverData
      ? `<img src="${book.coverData}" alt="">`
      : `<div class="no-cover" style="background:${COVER_COLORS[book.id.charCodeAt(0)%COVER_COLORS.length]}">${escHtml(book.title)}</div>`;
    const prog = getProgress(book);
    el.innerHTML = `<div class="cover">${coverContent}</div><div class="progress-bar"><div class="fill" style="width:${prog*100}%"></div></div><div class="title">${highlightText(book.title, q)}</div>`;
    results.appendChild(el);
  });
});

function highlightText(text, query) {
  if (!query) return escHtml(text);
  const esc = escHtml(text);
  const re = new RegExp(`(${escRegex(query)})`, 'gi');
  return esc.replace(re, '<span class="highlight">$1</span>');
}

// ===================== BOOK DETAIL =====================
function renderDetail(id) {
  const book = getBook(id);
  if (!book) return;

  const coverArea = document.getElementById('detail-cover-area');
  if (book.coverData) {
    coverArea.innerHTML = `<img class="detail-cover" src="${book.coverData}" alt="">`;
  } else {
    coverArea.innerHTML = `<div class="detail-cover-placeholder" style="background:${COVER_COLORS[book.id.charCodeAt(0)%COVER_COLORS.length]}">${escHtml(book.title)}</div>`;
  }

  document.getElementById('detail-title').textContent = book.title;
  document.getElementById('detail-author').textContent = book.author || 'Unknown author';

  const dates = [];
  if (book.addedAt) dates.push('Added ' + new Date(book.addedAt).toLocaleDateString());
  if (book.lastReadAt) dates.push('Last read ' + new Date(book.lastReadAt).toLocaleDateString());
  if (book.finishedAt) dates.push('Finished ' + new Date(book.finishedAt).toLocaleDateString());
  document.getElementById('detail-dates').textContent = dates.join(' · ');

  const prog = getProgress(book);
  document.getElementById('detail-progress-fill').style.width = (prog * 100) + '%';
  document.getElementById('detail-progress-text').textContent = book.totalPages ? `Page ${book.currentPage} of ${book.totalPages}` : 'Not started';

  // Tags
  const tagsEl = document.getElementById('detail-tags');
  const allTags = getTags();
  tagsEl.innerHTML = '';
  (book.tags || []).forEach(tName => {
    const t = allTags.find(x => x.name === tName);
    if (!t) return;
    const chip = document.createElement('span');
    chip.className = 'detail-tag';
    chip.style.background = t.color + '33';
    chip.style.color = t.color;
    chip.textContent = t.name;
    chip.onclick = () => { removeTagFromBook(id, tName); renderDetail(id); };
    tagsEl.appendChild(chip);
  });
  const addBtn = document.createElement('span');
  addBtn.className = 'add-tag-btn';
  addBtn.textContent = '+ Tag';
  addBtn.onclick = () => openTagModal(id);
  tagsEl.appendChild(addBtn);

  // Annotations
  const annSearch = document.getElementById('ann-search');
  annSearch.value = '';
  renderAnnotations(book);
  annSearch.oninput = () => renderAnnotations(book);

  // Personal notes
  const notesEl = document.getElementById('detail-personal-notes');
  notesEl.value = book.personalNotes || '';
  notesEl.oninput = () => updateBook(id, { personalNotes: notesEl.value });

  // Buttons
  document.getElementById('btn-read-book').onclick = () => openReader(id);
  document.getElementById('btn-finish-book').onclick = () => {
    updateBook(id, { finished: true, finishedAt: Date.now() });
    renderDetail(id);
  };
  document.getElementById('btn-finish-book').textContent = book.finished ? 'MARK UNFINISHED' : 'MARK FINISHED';
  document.getElementById('btn-finish-book').onclick = () => {
    if (book.finished) {
      updateBook(id, { finished: false, finishedAt: null });
    } else {
      updateBook(id, { finished: true, finishedAt: Date.now() });
    }
    renderDetail(id);
  };
  document.getElementById('btn-delete-book').onclick = () => {
    if (confirm('Delete "' + book.title + '"? This removes all data and the stored PDF.')) {
      deleteBook(id);
      showView('library');
    }
  };
}

function renderAnnotations(book) {
  const q = document.getElementById('ann-search').value.trim().toLowerCase();
  const container = document.getElementById('detail-annotations');
  let anns = book.annotations || [];
  if (q) anns = anns.filter(a => a.text.toLowerCase().includes(q));
  anns.sort((a, b) => a.page - b.page);
  container.innerHTML = anns.length ? '' : '<p style="font-size:13px;opacity:.5;margin-bottom:10px">No annotations yet.</p>';
  anns.forEach(a => {
    const el = document.createElement('div');
    el.className = 'annotation-item';
    el.innerHTML = `<div class="ann-page">Page ${a.page}</div><div class="ann-text">${q ? highlightText(a.text, q) : escHtml(a.text)}</div>`;
    container.appendChild(el);
  });
}

async function deleteBook(id) {
  let books = getBooks();
  books = books.filter(b => b.id !== id);
  saveBooks(books);
  try { await idbDelete('pdfs', id); } catch {}
  try { await idbDelete('covers', id); } catch {}
}

// ===================== ADD BOOK =====================
let pendingPdf = null;
let pendingCover = null;

function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('add-title').value = '';
  document.getElementById('add-author').value = '';
  document.getElementById('add-pdf').value = '';
  document.getElementById('add-cover').value = '';
  document.getElementById('pdf-drop').classList.remove('has-file');
  document.getElementById('pdf-drop').textContent = 'Tap to select PDF';
  document.getElementById('cover-drop').classList.remove('has-file');
  document.getElementById('cover-drop').textContent = 'Tap to select cover image';
  pendingPdf = null;
  pendingCover = null;

  // Re-add hidden inputs
  const pdfInput = document.createElement('input');
  pdfInput.type = 'file'; pdfInput.id = 'add-pdf'; pdfInput.accept = '.pdf'; pdfInput.style.display = 'none';
  document.getElementById('pdf-drop').appendChild(pdfInput);
  const coverInput = document.createElement('input');
  coverInput.type = 'file'; coverInput.id = 'add-cover'; coverInput.accept = 'image/*'; coverInput.style.display = 'none';
  document.getElementById('cover-drop').appendChild(coverInput);

  pdfInput.onchange = e => {
    const f = e.target.files[0];
    if (f) {
      pendingPdf = f;
      const drop = document.getElementById('pdf-drop');
      drop.classList.add('has-file');
      drop.childNodes[0].textContent = f.name;
    }
  };
  coverInput.onchange = e => {
    const f = e.target.files[0];
    if (f) {
      pendingCover = f;
      const drop = document.getElementById('cover-drop');
      drop.classList.add('has-file');
      drop.childNodes[0].textContent = f.name;
    }
  };
}

function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

async function saveBook() {
  const title = document.getElementById('add-title').value.trim();
  const author = document.getElementById('add-author').value.trim();
  if (!title) return alert('Please enter a title.');
  if (!pendingPdf) return alert('Please select a PDF file.');

  const id = 'book_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

  // Read PDF to get page count
  const pdfData = await readFileAsArrayBuffer(pendingPdf);
  let totalPages = 0;
  try {
    const pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
    totalPages = pdfDoc.numPages;
  } catch {}

  // Store PDF in IndexedDB
  await idbPut('pdfs', id, pdfData);

  // Cover as data URL
  let coverData = null;
  if (pendingCover) {
    coverData = await readFileAsDataURL(pendingCover);
  }

  const book = {
    id, title, author, coverData, totalPages,
    currentPage: 1, finished: false,
    tags: [], annotations: [], personalNotes: '',
    addedAt: Date.now(), lastReadAt: null, finishedAt: null
  };

  const books = getBooks();
  books.push(book);
  saveBooks(books);

  closeAddModal();
  renderLibrary();
}

// ===================== TAGS =====================
let tagBookId = null;
let selectedTagColor = TAG_COLORS[0];

function openTagModal(bookId) {
  tagBookId = bookId;
  selectedTagColor = TAG_COLORS[0];
  document.getElementById('tag-name-input').value = '';
  const colorsEl = document.getElementById('tag-colors');
  colorsEl.innerHTML = '';
  TAG_COLORS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'tag-color-opt' + (c === selectedTagColor ? ' selected' : '');
    el.style.background = c;
    el.onclick = () => {
      selectedTagColor = c;
      colorsEl.querySelectorAll('.tag-color-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    };
    colorsEl.appendChild(el);
  });
  document.getElementById('tag-modal').classList.add('open');
}

function closeTagModal() { document.getElementById('tag-modal').classList.remove('open'); }

function saveTag() {
  const name = document.getElementById('tag-name-input').value.trim();
  if (!name) return;

  let tags = getTags();
  if (!tags.find(t => t.name === name)) {
    tags.push({ name, color: selectedTagColor });
    saveTags(tags);
  }

  if (tagBookId) {
    const book = getBook(tagBookId);
    if (book && !(book.tags || []).includes(name)) {
      updateBook(tagBookId, { tags: [...(book.tags || []), name] });
    }
  }

  closeTagModal();
  if (currentView === 'detail') renderDetail(currentBookId);
  if (currentView === 'library') renderLibrary();
}

function removeTagFromBook(bookId, tagName) {
  const book = getBook(bookId);
  if (book) {
    updateBook(bookId, { tags: (book.tags || []).filter(t => t !== tagName) });
  }
}

// ===================== PDF READER =====================
let readerBookId = null;
let pdfDoc = null;
let currentPage = 1;
let rendering = false;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function openReader(bookId) {
  readerBookId = bookId;
  const book = getBook(bookId);
  if (!book) return;

  document.getElementById('reading-view').classList.add('active');
  document.getElementById('reader-title').textContent = book.title;

  const pdfData = await idbGet('pdfs', bookId);
  if (!pdfData) { alert('PDF not found. It may have been deleted.'); closeReader(); return; }

  pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
  currentPage = book.currentPage || 1;

  const slider = document.getElementById('reader-slider');
  slider.max = pdfDoc.numPages;
  slider.value = currentPage;
  slider.oninput = () => { currentPage = parseInt(slider.value); renderPage(); saveProgress(); };

  updateBook(bookId, { totalPages: pdfDoc.numPages, lastReadAt: Date.now() });
  renderPage();
  renderNoteDots();

  // Touch/click navigation
  document.getElementById('tap-left').onclick = () => prevPage();
  document.getElementById('tap-right').onclick = () => nextPage();

  // Swipe
  let startX = 0;
  const wrap = document.getElementById('canvas-wrap');
  wrap.ontouchstart = e => { startX = e.touches[0].clientX; };
  wrap.ontouchend = e => {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) { diff > 0 ? prevPage() : nextPage(); }
  };
}

function closeReader() {
  document.getElementById('reading-view').classList.remove('active');
  pdfDoc = null;
  readerBookId = null;
}

async function renderPage() {
  if (!pdfDoc || rendering) return;
  rendering = true;

  const page = await pdfDoc.getPage(currentPage);
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight - 10;
  const vp = page.getViewport({ scale: 1 });
  const scale = Math.min(wrapW / vp.width, wrapH / vp.height) * (window.devicePixelRatio || 1);
  const viewport = page.getViewport({ scale });

  canvas.width = viewport.width;
  canvas.height = viewport.height;
  canvas.style.width = (viewport.width / (window.devicePixelRatio || 1)) + 'px';
  canvas.style.height = (viewport.height / (window.devicePixelRatio || 1)) + 'px';

  await page.render({ canvasContext: ctx, viewport }).promise;

  document.getElementById('reader-page').textContent = `${currentPage} / ${pdfDoc.numPages}`;
  document.getElementById('reader-slider').value = currentPage;

  renderNoteDots();
  rendering = false;
}

function nextPage() {
  if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; renderPage(); saveProgress(); }
}
function prevPage() {
  if (pdfDoc && currentPage > 1) { currentPage--; renderPage(); saveProgress(); }
}

function saveProgress() {
  if (!readerBookId) return;
  const updates = { currentPage, lastReadAt: Date.now() };
  const book = getBook(readerBookId);
  if (book && book.totalPages && currentPage >= book.totalPages) {
    // Don't auto-finish; let user decide
  }
  updateBook(readerBookId, updates);
}

// ===================== NOTES IN READER =====================
function renderNoteDots() {
  const container = document.getElementById('note-dots');
  container.innerHTML = '';
  if (!readerBookId) return;
  const book = getBook(readerBookId);
  const pageNotes = (book.annotations || []).filter(a => a.page === currentPage);
  pageNotes.forEach(note => {
    const dot = document.createElement('div');
    dot.className = 'note-dot';
    dot.innerHTML = `<div class="note-tooltip">${escHtml(note.text)}</div>`;
    dot.onclick = e => { e.stopPropagation(); dot.classList.toggle('show-tip'); };
    container.appendChild(dot);
  });
}

function openNoteModal() {
  document.getElementById('note-page-label').textContent = `Page ${currentPage}`;
  document.getElementById('note-text-input').value = '';
  document.getElementById('note-modal').classList.add('open');
}
function closeNoteModal() { document.getElementById('note-modal').classList.remove('open'); }

function saveNote() {
  const text = document.getElementById('note-text-input').value.trim();
  if (!text || !readerBookId) return;
  const book = getBook(readerBookId);
  const annotations = book.annotations || [];
  annotations.push({ page: currentPage, text, createdAt: Date.now() });
  updateBook(readerBookId, { annotations });
  closeNoteModal();
  renderNoteDots();
}

// ===================== ALL NOTES VIEW =====================
function renderAllNotes() {
  const container = document.getElementById('all-notes-list');
  container.innerHTML = '';
  const books = getBooks();
  const booksWithNotes = books.filter(b => (b.annotations && b.annotations.length) || b.personalNotes);

  if (!booksWithNotes.length) {
    container.innerHTML = '<p style="padding:0 16px;font-size:13px;opacity:.5">No notes yet. Add annotations while reading!</p>';
    return;
  }

  booksWithNotes.forEach(book => {
    const group = document.createElement('div');
    group.className = 'notes-book-group';
    let html = `<h3 style="cursor:pointer" onclick="currentBookId='${book.id}';showView('detail')">${escHtml(book.title)}</h3>`;
    if (book.personalNotes) {
      html += `<div class="annotation-item" style="background:var(--lavender);margin-bottom:8px"><div class="ann-page">Personal Notes</div><div class="ann-text">${escHtml(book.personalNotes)}</div></div>`;
    }
    (book.annotations || []).sort((a,b) => a.page - b.page).forEach(a => {
      html += `<div class="annotation-item"><div class="ann-page">Page ${a.page}</div><div class="ann-text">${escHtml(a.text)}</div></div>`;
    });
    group.innerHTML = html;
    container.appendChild(group);
  });
}

// ===================== STATS =====================
function renderStats() {
  const books = getBooks();
  const now = new Date();
  const yearStart = new Date(now.getFullYear(), 0, 1).getTime();

  const finishedThisYear = books.filter(b => b.finished && b.finishedAt && b.finishedAt >= yearStart).length;

  // Reading streak: consecutive days with lastReadAt
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const readDates = new Set();
  books.forEach(b => {
    if (b.lastReadAt) {
      const d = new Date(b.lastReadAt); d.setHours(0,0,0,0);
      readDates.add(d.getTime());
    }
  });
  let checkDate = new Date(today);
  while (readDates.has(checkDate.getTime())) {
    streak++;
    checkDate.setDate(checkDate.getDate() - 1);
  }

  // Most annotated
  let mostAnnotated = { title: '—', count: 0 };
  books.forEach(b => {
    const count = (b.annotations || []).length;
    if (count > mostAnnotated.count) mostAnnotated = { title: b.title, count };
  });

  // Top tag
  const tagCounts = {};
  books.forEach(b => (b.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
  const topTag = Object.entries(tagCounts).sort((a,b) => b[1] - a[1])[0];

  document.getElementById('stats-cards').innerHTML = `
    <div class="stat-card"><div class="stat-number">${finishedThisYear}</div><div class="stat-label">Books Finished This Year</div></div>
    <div class="stat-card"><div class="stat-number">${streak}</div><div class="stat-label">Day Reading Streak</div></div>
    <div class="stat-card"><div class="stat-number" style="font-size:28px">${escHtml(mostAnnotated.title)}</div><div class="stat-label">Most Annotated Book</div><div class="stat-detail">${mostAnnotated.count} annotations</div></div>
    <div class="stat-card"><div class="stat-number" style="font-size:32px">${topTag ? escHtml(topTag[0]) : '—'}</div><div class="stat-label">Top Tag</div>${topTag ? `<div class="stat-detail">Used ${topTag[1]} time${topTag[1]>1?'s':''}</div>` : ''}</div>
  `;
}

// ===================== EXPORT / IMPORT =====================
function exportData() {
  const data = {
    books: getBooks(),
    tags: getTags(),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'the-library-export.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.getElementById('import-file');
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.books) saveBooks(data.books);
      if (data.tags) saveTags(data.tags);
      alert('Data imported successfully!');
      renderLibrary();
    } catch { alert('Invalid JSON file.'); }
  };
  input.click();
}

// ===================== UTILS =====================
function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsArrayBuffer(file);
  });
}
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ===================== INIT =====================
async function init() {
  await openDB();
  renderLibrary();

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    try { await navigator.serviceWorker.register('service-worker.js'); }
    catch(e) { console.log('SW registration skipped:', e); }
  }
}
init();
</script>
